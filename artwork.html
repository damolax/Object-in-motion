<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Artwork — Objects In Motion</title><meta name="description" content="Explore a selected rolling ball sculpture by Robert Kalinovich."><link rel="stylesheet" href="styles.css"></head><body data-page="portfolio"><main><div id="artwork-main"></div></main><script src="data.js"></script><script>
const params=new URLSearchParams(location.search);const id=params.get('id')||'observer';const w=OIM_WORKS.find(x=>x.id===id)||OIM_WORKS[0];const idx=OIM_WORKS.indexOf(w);const next=OIM_WORKS[(idx+1)%OIM_WORKS.length];document.title=`${w.title} — Objects In Motion`;const g=[w.fallback,'assets/images/detail-blue.jpg','assets/images/detail-track.jpg'];const price=w.lastPrice?`<div><dt>Last publicly listed price</dt><dd>${w.lastPrice} <button class="review-note" type="button" data-note="This is the last price publicly shown on Robert’s current shop for this sold work. It is historical context, not a current offer.">i</button></dd></div>`:'';
document.getElementById('artwork-main').innerHTML=`
<section class="artwork-hero"><div class="artwork-media" data-reveal><img src="${w.image}" data-fallback="${w.fallback}" alt="${w.title} rolling ball sculpture"></div><div class="artwork-meta" data-reveal><a class="back" href="portfolio.html">← Return to portfolio</a><p class="kicker">${w.category}${w.year?' · '+w.year:''}</p><h1>${w.title}</h1><p class="lead">${w.summary}</p><dl class="spec-list"><div><dt>Collection status</dt><dd>${w.status}</dd></div><div><dt>Dimensions</dt><dd>${w.size}</dd></div><div><dt>Materials</dt><dd>${w.materials}</dd></div><div><dt>Movement</dt><dd>${w.tracks}</dd></div>${price}</dl><div class="buying-bar"><a href="contact.html?reason=availability">Ask about availability</a><a href="commissions.html#enquire">Commission a related original</a><a href="visualize.html?work=${w.id}">See it in your space</a><button class="save-work-button" type="button" data-save-id="${w.id}" aria-pressed="false"><span data-save-label>Save work</span> +</button></div></div></section>
<section class="section artwork-story"><div><p class="kicker">The work</p><blockquote>${w.title} asks the eye to <em>stay a little longer.</em></blockquote></div><div class="artwork-story-copy"><p>${w.story}</p><p>Every Objects In Motion sculpture is handmade. A future commission inspired by this piece would be developed as a new original rather than copied.</p></div></section>
${w.video?`<section class="video-block" data-reveal><div class="video-frame"><iframe src="https://www.youtube-nocookie.com/embed/${w.video}?rel=0&modestbranding=1" title="${w.title} video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div></section>`:''}
<section class="section"><div class="artwork-gallery"><div class="gallery-image" data-reveal><img src="${g[0]}" alt="${w.title} detail"></div><div class="gallery-stack"><div class="gallery-image" data-reveal><img src="${g[1]}" alt="Stainless steel and marble detail"></div><div class="gallery-image" data-reveal><img src="${g[2]}" alt="Handcrafted track detail"></div></div></div></section>
<section class="section"><div class="assurance-grid"><article class="assurance-card" data-reveal><span>01</span><h3>One original</h3><p>No two sculptures are exactly alike. A related commission becomes its own work.</p></article><article class="assurance-card" data-reveal><span>02</span><h3>Direct from Robert</h3><p>The collector works with the artist through concept, build, approval and delivery.</p></article><article class="assurance-card" data-reveal><span>03</span><h3>Worldwide delivery</h3><p>Works can be carefully packed and shipped to many destinations worldwide.</p></article><article class="assurance-card" data-reveal><span>04</span><h3>Minimal maintenance</h3><p>Basic cleaning of the track and marbles helps keep the work running smoothly.</p></article></div></section>
<section class="acquire-panel"><div data-reveal><p class="kicker">Inspired by this work?</p><h2 class="section-title">Create a new<br><em>original.</em></h2><p>Robert will not copy a collected sculpture. A related commission can explore its scale, materials, rhythm or character while becoming a completely new piece.</p><a class="button dark" href="commissions.html#enquire">Discuss a related original <span class="arrow">↗</span></a></div><div data-reveal><p class="kicker">Considering your own space?</p><h2 class="body-large">Start with a photograph and approximate measurements.</h2><p>This helps clarify scale, placement and viewing angles before a formal commission discussion.</p><a class="text-link" href="visualize.html?work=${w.id}">Visualize this direction in your space <span>↗</span></a></div></section>
<section class="section"><a class="next-work" href="artwork.html?id=${next.id}"><div><p class="kicker">Next work</p><strong>${next.title}</strong></div><span class="button">Continue through the archive <span class="arrow">↗</span></span></a></section>`;
</script><script src="site.js"></script></body></html>
